services:

  backend:
    container_name: instagram_backend
    build: .
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    ports:
      - "8000:8000"
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: instagram_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles

volumes:
  local_db: